name: FoxESS Battery Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run FoxESS Battery Check
        env:
          FOXESS_API_KEY: ${{ secrets.FOXESS_API_KEY }}
          FOXESS_SN: ${{ secrets.FOXESS_SN }}
          FOXESS_SECRET: ${{ secrets.FOXESS_SECRET }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TZ: Australia/Sydney
        run: python .github/workflows/foxess_battery_monitor.py

      - name: Commit state changes
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          if [[ -f foxess_state.json ]]; then
            git add foxess_state.json
            git commit -m "Update FoxESS state at $(date -u +'%Y-%m-%d %H:%M:%S')" || true
            git push || true
          fi
