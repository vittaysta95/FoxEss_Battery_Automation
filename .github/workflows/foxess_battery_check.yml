name: FoxESS Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests pytz
      - run: python .github/workflows/foxess_battery_monitor.py
        env:
          FOXESS_API_KEY: ${{ secrets.FOXESS_API_KEY }}
          FOXESS_SN: ${{ secrets.FOXESS_SN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
